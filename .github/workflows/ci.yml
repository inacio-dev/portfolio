name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, format, test e build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      # `vitest run` (não watch). Falha se algum teste quebrar — bloqueia
      # o merge da PR. Roda antes do build pra dar feedback rápido em
      # quebra de lógica pura/forms (build leva ~30s, vitest leva ~3s).
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
